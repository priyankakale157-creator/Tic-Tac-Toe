<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Tic Tac Toe</h1>

<div class="game">

<div class="cell" data-cell></div>
<div class="cell" data-cell></div>
<div class="cell" data-cell></div>

<div class="cell" data-cell></div>
<div class="cell" data-cell></div>
<div class="cell" data-cell></div>

<div class="cell" data-cell></div>
<div class="cell" data-cell></div>
<div class="cell" data-cell></div>

</div>

<h2 id="status">Player X Turn</h2>

<button onclick="restartGame()">Restart Game</button>

<script>let cells = document.querySelectorAll("[data-cell]");
let statusText = document.getElementById("status");

let currentPlayer = "X";
let gameActive = true;

let winningConditions = [
  [0, 1, 2],
  [3, 4, 5],
  [6, 7, 8],
  [0, 3, 6],
  [1, 4, 7],
  [2, 5, 8],
  [0, 4, 8],
  [2, 4, 6],
];

cells.forEach((cell, index) => {
  cell.addEventListener("click", () => {
    if (cell.textContent !== "" || !gameActive) return;

    cell.textContent = currentPlayer;

    checkWinner();

    currentPlayer = currentPlayer === "X" ? "O" : "X";
    statusText.textContent = "Player " + currentPlayer + " Turn";
  });
});

function checkWinner() {
  for (let condition of winningConditions) {
    let a = cells[condition[0]].textContent;
    let b = cells[condition[1]].textContent;
    let c = cells[condition[2]].textContent;

    if (a === "" || b === "" || c === "") continue;

    if (a === b && b === c) {
      statusText.textContent = "Player " + a + " Wins!";
      gameActive = false;
      return;
    }
  }

  let draw = [...cells].every((cell) => cell.textContent !== "");

  if (draw) {
    statusText.textContent = "Game Draw!";
    gameActive = false;
  }
}

function restartGame() {
  cells.forEach((cell) => (cell.textContent = ""));
  currentPlayer = "X";
  gameActive = true;
  statusText.textContent = "Player X Turn";
}</script>

</body>

</html>
